services:
  fatpaper-mysql:
    image: mysql:8.0
    container_name: fatpaper-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../conf/sql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - monopoly-network

  monopoly-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - MAP_ENCRYPT_KEY=${MAP_ENCRYPT_KEY:-changeme16chkey!}
        - PROTOCOL=${PROTOCOL:-http}
        - MONOPOLY_DOMAIN=${MONOPOLY_DOMAIN:-localhost}
        - SERVER_PORT=${SERVER_PORT:-81}
        - API_BASE_PREFIX=${API_BASE_PREFIX:-}
        - ADMIN_BASE_PREFIX=${ADMIN_BASE_PREFIX:-}
    image: monopoly-server
    container_name: monopoly-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8081}:${SERVER_PORT:-8081}"  # 主服务器
      - "${ICE_SERVER_PORT:-8082}:${ICE_SERVER_PORT:-8082}"  # ICE 服务器
      - "${MONOPOLY_ADMIN_PORT:-8083}:${MONOPOLY_ADMIN_PORT:-8083}"  # Admin 管理面板
    env_file:
      - path: .env
        required: false
    volumes:
      # Persist user-uploaded files (avatars, game maps, logs)
      - server-public:/app/apps/server/public
    depends_on:
      fatpaper-mysql:
        condition: service_healthy
    networks:
      - monopoly-network

  coturn:
    image: coturn/coturn:debian
    container_name: monopoly-coturn
    restart: unless-stopped
    ports:
      - "${STUN_PORT:-3478}:3478"     # STUN
      - "${STUN_PORT:-3478}:3478/udp" # STUN UDP
      - "${TURN_PORT:-5349}:5349"     # TURN TLS
      - "${TURN_PORT:-5349}:5349/udp" # TURN TLS UDP
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    env_file:
      - path: .env
        required: false
    command:
      - "-c"
      - "/etc/coturn/turnserver.conf"
      - "--prometheus"
      - "--prometheus-port=9641"
      - "--log-file=stdout"
    networks:
      - monopoly-network

networks:
  monopoly-network:
    external: true

volumes:
  mysql-data:
  server-public:
