name: Release

on:
  push:
    tags:
      - '@mine-monopoly/client@*'
      - '@mine-monopoly/map-editor@*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    environment: build

    steps:
      - uses: actions/checkout@v4

      - name: Parse Tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          PKG_NAME=$(echo "$TAG" | sed -E 's/@mine-monopoly\/(.+)@.+/\1/')
          VERSION=$(echo "$TAG" | sed -E 's/@mine-monopoly\/.+@(.+)/\1/')
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG → pkg=$PKG_NAME, ver=$VERSION"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        shell: bash

      - run: pnpm --filter @mine-monopoly/env run build
        shell: bash

      - name: Create .env
        shell: bash
        run: |
          cat > .env << EOF
          MONOPOLY_DOMAIN=${{ vars.MONOPOLY_DOMAIN }}
          PROTOCOL=${{ vars.PROTOCOL }}
          API_BASE_PREFIX=${{ vars.API_BASE_PREFIX || '' }}
          ICE_BASE_PREFIX=${{ vars.ICE_BASE_PREFIX || '' }}
          ADMIN_BASE_PREFIX=${{ vars.ADMIN_BASE_PREFIX || '' }}
          SERVER_PORT=${{ vars.SERVER_PORT }}
          ICE_SERVER_PORT=${{ vars.ICE_SERVER_PORT }}
          MONOPOLY_ADMIN_PORT=${{ vars.MONOPOLY_ADMIN_PORT }}
          NODE_ENV=production
          MAP_ENCRYPT_KEY=${{ secrets.MAP_ENCRYPT_KEY }}
          EOF

      - name: Build Client
        if: steps.tag.outputs.pkg_name == 'client'
        shell: bash
        run: pnpm --filter @mine-monopoly/client run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Map Editor
        if: steps.tag.outputs.pkg_name == 'map-editor'
        shell: bash
        run: pnpm --filter @mine-monopoly/map-editor run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Client Artifacts
        if: steps.tag.outputs.pkg_name == 'client'
        uses: actions/upload-artifact@v4
        with:
          name: client-win
          path: |
            apps/client/dist/electron/*/*-Setup.exe
            apps/client/dist/electron/*/*-Setup.exe.blockmap
            apps/client/dist/electron/*/latest.yml
          if-no-files-found: error

      - name: Upload Editor Artifacts
        if: steps.tag.outputs.pkg_name == 'map-editor'
        uses: actions/upload-artifact@v4
        with:
          name: editor-win
          path: |
            apps/map-editor/dist/electron/*/*-Setup.exe
            apps/map-editor/dist/electron/*/*-Setup.exe.blockmap
            apps/map-editor/dist/electron/*/latest.yml
          if-no-files-found: error

      - name: Prepare Release Notes
        id: notes
        shell: bash
        run: |
          PKG_NAME="${{ steps.tag.outputs.pkg_name }}"
          NOTES_FILE="apps/${PKG_NAME}/build/release-notes.md"

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release-notes.md
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "暂无详细更新日志" > release-notes.md
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Parse Tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          PKG_NAME=$(echo "$TAG" | sed -E 's/@mine-monopoly\/(.+)@.+/\1/')
          VERSION=$(echo "$TAG" | sed -E 's/@mine-monopoly\/.+@(.+)/\1/')
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.pkg_name }} v${{ steps.tag.outputs.version }}"
          body_path: artifacts/release-notes.md
          draft: false
          files: |
            artifacts/**/*-Setup.exe

  upload-r2:
    needs: build
    runs-on: ubuntu-latest
    environment: build

    steps:
      - name: Parse Tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          PKG_NAME=$(echo "$TAG" | sed -E 's/@mine-monopoly\/(.+)@.+/\1/')
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten & Upload to Cloudflare R2
        run: |
          mkdir -p r2-flat
          PKG_NAME="${{ steps.tag.outputs.pkg_name }}"

          find artifacts -type f \( -name "*.exe" -o -name "*.blockmap" -o -name "*.yml" \) \
            -exec cp {} r2-flat/ \;

          echo "=== 准备上传到 R2 的文件（${PKG_NAME}） ==="
          ls -lh r2-flat/

          aws s3 sync r2-flat/ "s3://${R2_BUCKET_NAME}/releases/${PKG_NAME}/download/" \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            --no-progress \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
